<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Agustín Stoppello</title>
    <meta name="description" content="Blog de Agustín Stoppello sobre UX/UI, diseño y desarrollo web.">
    <link rel="icon" href="imag/Logo sin fondo.PNG" type="image/x-icon">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MCEKKBBLHF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MCEKKBBLHF');
    </script>
</head>
<body>
    <div class="container-fluid">
        <!-- Mobile Menu Button -->
        <button id="mobile-menu" class="d-md-none btn btn-primary position-fixed" aria-label="Abrir menú">
            <i class="fas fa-bars"></i>
        </button>

        <div class="row min-vh-100">
            <!-- Sidebar Column -->
            <div class="col-md-4 col-lg-3 bg-light p-4 nav-list"></div>

            <!-- Main Content Column -->
            <div class="col-md-8 col-lg-9 p-4 pt-5 pt-md-4">
                <div class="bg-white rounded-3 p-4 shadow-sm">
                    <h1 class="mb-2">Blog</h1>
                    <p class="text-muted mb-4">Artículos sobre UX/UI, diseño y desarrollo web.</p>

                    <!-- Blog posts loaded dynamically -->
                    <div id="blog-posts-container">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Cargando artículos...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Post detail modal -->
                <div class="modal fade" id="postModal" tabindex="-1" aria-labelledby="postModalLabel" aria-hidden="true">
                    <div class="modal-dialog modal-lg modal-fullscreen-sm-down modal-dialog-scrollable">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="postModalLabel"></h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                            </div>
                            <div class="modal-body" id="postModalBody"></div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <footer class="mt-5 pt-4 border-top">
                    <p class="text-muted text-center">&copy; 2025 by Agustin Stoppello | <a href="privacy-policy.html" class="text-decoration-none">Política de Privacidad</a> | <a href="cookie-policy.html" class="text-decoration-none">Política de cookies</a></p>
                </footer>
            </div>
        </div>
    </div>

    <script src="js/database-client.js"></script>
    <script src="js/sidebar.js"></script>
    <script>renderSidebar('');</script>
    <script>
        async function openPost(id) {
            try {
                const post = await window.dbClient.getPost(id);
                if (post) {
                    document.getElementById('postModalLabel').textContent = post.title;
                    document.getElementById('postModalBody').innerHTML = `
                        <p class="text-muted small mb-3">Por ${escapeHtml(post.author)} &mdash; ${new Date(post.created_at).toLocaleDateString('es-AR', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                        <div>${escapeHtml(post.content).replace(/\n/g, '<br>')}</div>
                    `;
                    new bootstrap.Modal(document.getElementById('postModal')).show();
                }
            } catch (err) {
                console.error('Error al cargar el artículo:', err);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        async function loadBlogPosts() {
            const container = document.getElementById('blog-posts-container');
            try {
                const posts = await window.dbClient.getPosts();
                if (!posts || posts.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-5 text-muted">
                            <i class="fas fa-newspaper fa-3x mb-3 opacity-50"></i>
                            <p>No hay artículos publicados todavía.</p>
                        </div>`;
                    return;
                }
                container.innerHTML = `<div class="row g-4">${posts.map(post => `
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card h-100 border-0 shadow-sm">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">${escapeHtml(post.title)}</h5>
                                <p class="card-text text-muted small mb-2">
                                    <i class="fas fa-user me-1"></i>${escapeHtml(post.author)}
                                    &nbsp;&middot;&nbsp;
                                    <i class="fas fa-calendar me-1"></i>${new Date(post.created_at).toLocaleDateString('es-AR')}
                                </p>
                                <p class="card-text flex-grow-1">${escapeHtml(post.content).substring(0, 120)}…</p>
                                <button onclick="openPost(${post.id})" class="btn btn-outline-primary mt-auto w-100">Leer más</button>
                            </div>
                        </div>
                    </div>`).join('')}</div>`;
            } catch (err) {
                console.error('Error cargando blog:', err);
                container.innerHTML = `
                    <div class="alert alert-warning" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        No se pudieron cargar los artículos. Por favor, intentá de nuevo más tarde.
                    </div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadBlogPosts);
    </script>
</body>
</html>
